flows:
  's2c':
     proto: tcp
     src: 12.0.2.114
     sport: 5060

  'c2s':
     proto: tcp
     src: 192.168.0.113
     sport: random_num(10000,20000)
     dst: s2c.src
     dport: s2c.sport

scenario:
- send:
    flow: c2s
    flags: S
- recv:
    flow: s2c
    flags: S
    exec:
    - s2c.dst=pkt[IP].src
    - s2c.dport=pkt[TCP].sport
- send:
    flow: s2c
    flags: SA
- recv:
    flow: c2s
    flags: SA
- send:
    flow: c2s
    data: |-
      INVITE sip:1028@{c2s.dst}:5060 SIP/2.0\r\n
      Via: SIP/2.0/TCP {c2s.src}:5060;branch=z9hG4bK-12880-1-0\r\n
      From: 1024 <sip:1024@{c2s.src}:5060>;tag=12880SIPpTag001\r\n
      To:  <sip:1028@{c2s.dst}:5060>\r\n
      Call-ID: 1-12880@{c2s.src}\r\n
      CSeq: 1 INVITE\r\n
      Contact: sip:1024@{c2s.src}:5060\r\n
      Max-Forwards: 70\r\n
      Subject: Performance Test\r\n
      Content-Type: application/sdp\r\n
      Content-Length:   14

- recv:
    flow: s2c
    match: 'INVITE sip:1028@'
    search: 
      - 'SIP/2.0/TCP (?P<via_ip>[\d.]+):(?P<via_port>\d+);'
      - 'Contact:\s*sip:[^@]+@(?P<contact_ip>[\d.]+):(?P<contact_port>\d+)'

- send:
    flow: c2s
    data: |
      5\r\n
      \r\n
      v=0\r\n
      o=user1 53655765 2353687637 IN IP4 {c2s.src}\r\n
      s=-\r\n
      c=IN IP4 {c2s.src}\r\n
      t=0 0\r\n
      m=audio 6000 RTP/AVP 0\r\n
      a=rtpmap:0 PCMU/8000\r\n
      x-my=0\r\n

- recv:
    flow: s2c
    match: '\s*\d{3}\r?\n'
    search: 
      - 'c=IN IP4 (?P<sdp_c>.*)\r\n'
      - 'm=audio (?P<sdp_m>\d{4,5}) RTP/AVP'

- send:
    flow: s2c
    flags: A
